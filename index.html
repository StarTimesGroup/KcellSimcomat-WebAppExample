<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMCOMAT Kiosk Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Tailwind v4 (modern WebViews); falls back to bundled v2 on older ones -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --color-brand: #c5003e;
            --color-brand-hover: #a80032;
            --color-brand-light: #ff4d79;
        }
    </style>
    <script>if (!window.__tw) { var l=document.createElement('link'); l.rel='stylesheet'; l.href='tailwind.min.css'; document.head.appendChild(l); }</script>
    <style>
        /* Brand fallback for Tailwind v2 */
        .text-brand{color:#c5003e}.bg-brand{background-color:#c5003e}
        .from-brand{--tw-gradient-from:#c5003e;--tw-gradient-stops:var(--tw-gradient-from),rgb(197 0 62/0)}
        .to-brand-hover{--tw-gradient-to:#a80032}
        .hover\:from-brand-light:hover{--tw-gradient-from:#ff4d79}
        .hover\:to-brand:hover{--tw-gradient-to:#c5003e}
        * { user-select: none; }
        body { overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(156,163,175,.3); border-radius: 99px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(156,163,175,.5); }
    </style>

    <!-- Layer 1: Android bridge + SerialPortConnection -->
    <script src="bridge.js"></script>
    <!-- Layer 2: MTK-F31 protocol -->
    <script src="MtkF31.js"></script>
</head>

<body class="bg-slate-100 font-sans text-slate-900 overflow-hidden flex flex-col h-screen w-screen">

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-[0_2px_8px_rgba(15,23,42,0.04)] shrink-0">
        <div class="flex flex-col gap-0.5">
            <img src="logo.svg" style="height:26px;display:block" alt="activ logo">
            <p class="text-[10px] text-slate-500 font-semibold">Web Portal v2.0.0</p>
        </div>
        <div class="flex items-center gap-3">
            <!-- Port selector -->
            <div class="relative flex items-center">
                <select id="select-port" class="bg-slate-100 hover:bg-slate-200/70 border border-slate-200 text-slate-800 text-xs font-semibold rounded-lg focus:ring-2 focus:ring-brand focus:border-brand pl-3 pr-8 py-2 appearance-none cursor-pointer transition-colors outline-none">
                    <option value="auto">Auto-Detect Dispenser</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2.5 text-slate-500">
                    <svg class="fill-current" style="height:16px;width:16px" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                </div>
            </div>
            <!-- Bridge status badge -->
            <div id="badge-api" class="flex items-center gap-1.5 bg-slate-100 border border-slate-200 text-[11px] text-slate-600 px-3 py-1.5 rounded-full font-semibold">
                <span id="badge-dot" class="rounded-full" style="width:6px;height:6px;display:inline-block"></span>
                <span id="badge-label">—</span>
            </div>
            <!-- Refresh -->
            <button onclick="window.location.reload()" class="flex items-center justify-center bg-slate-100 hover:bg-slate-200 border border-slate-200 text-slate-600 p-2 rounded-full cursor-pointer transition-colors outline-none" title="Refresh">
                <svg class="fill-current" style="height:12px;width:12px" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
        </div>
    </header>

    <div class="flex-1 flex flex-col p-5 gap-5 h-[calc(100vh-70px)] overflow-hidden">

        <!-- Control Panel -->
        <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] flex flex-col gap-4 shrink-0">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Control Panel</h2>

            <div class="bg-slate-50 border border-slate-200 rounded-xl p-5 text-center">
                <div class="text-lg font-bold text-brand" id="status-title">Status: Idle</div>
                <div class="text-[13px] text-slate-500 mt-1 font-medium" id="status-sub">Select a port and tap an action.</div>
            </div>

            <button id="btn-dispense"   class="btn-action bg-gradient-to-r from-brand to-brand-hover hover:from-brand-light hover:to-brand">Dispense SIM</button>
            <button id="btn-read-iccid" class="btn-action bg-gradient-to-r from-indigo-600 to-indigo-800 hover:from-indigo-500 hover:to-indigo-600">Read ICCID</button>
            <a href="https://sim.fabtech.uz"       class="btn-action bg-gradient-to-r from-brand to-brand-hover hover:from-brand-light hover:to-brand text-center">sim.fabtech.uz</a>
            <a href="https://activ.kz/new-number"  class="btn-action bg-gradient-to-r from-brand to-brand-hover hover:from-brand-light hover:to-brand text-center">activ.kz / new number</a>
        </div>

        <!-- Device Logs -->
        <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] flex flex-col overflow-hidden flex-1 min-h-[160px]">
            <div class="flex justify-between items-center mb-3 shrink-0">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Device Logs</h2>
                <span id="console-clear" class="text-xs text-slate-400 hover:text-red-600 cursor-pointer transition-colors font-medium">Clear</span>
            </div>
            <div id="console-log" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-4 font-mono text-[12px] overflow-y-auto custom-scrollbar text-slate-800">
                <div class="mb-1.5"><span class="text-slate-400 mr-1.5">[System]</span>WebView loaded. Ready.</div>
            </div>
        </div>
    </div>

    <style>
        /* Shared action button style — applied via class, keeps HTML clean */
        .btn-action {
            display: block; width: 100%;
            color: white; font-weight: 600;
            padding: 0.875rem 1.5rem; border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,.1);
            transition: all .2s; outline: none; cursor: pointer; border: none;
        }
        .btn-action:active { transform: scale(.99); }
        .btn-action:disabled { opacity: .4; pointer-events: none; }
    </style>

    <script>
    // ── Layer 3: App glue ──────────────────────────────────────────────────────
    // Concerns: UI helpers, port management, button wiring.
    // Protocol details live in MtkF31.js; bridge details live in bridge.js.

    var controller = null;

    // ── UI helpers ─────────────────────────────────────────────────────────────

    function log(msg, type) {
        var colors = { error:'text-red-600 font-semibold', warn:'text-amber-600 font-semibold',
                       send:'text-fuchsia-600', recv:'text-emerald-700' };
        var ms = new Date().getMilliseconds().toString().padStart(3,'0');
        var time = new Date().toLocaleTimeString('en-US',{hour12:false}) + '.' + ms;
        var el = document.createElement('div');
        el.className = 'mb-1.5 break-all';
        el.innerHTML = '<span class="text-slate-400 mr-1.5">[' + time + ']</span>'
                     + '<span class="' + (colors[type] || 'text-indigo-600') + '">' + msg + '</span>';
        var box = document.getElementById('console-log');
        box.appendChild(el);
        box.scrollTop = box.scrollHeight;
    }

    function setStatus(title, sub) {
        document.getElementById('status-title').textContent = 'Status: ' + title;
        document.getElementById('status-sub').textContent = sub || '';
        var el = document.getElementById('status-title');
        var t = title.toLowerCase();
        el.className = 'text-lg font-bold ' + (t.includes('error')||t.includes('fail') ? 'text-red-600'
                                              : t.includes('success') ? 'text-emerald-600'
                                              : 'text-brand');
    }

    function lockUI()   { $('#btn-dispense, #btn-read-iccid, #select-port').prop('disabled', true); }
    function unlockUI() { $('#btn-dispense, #btn-read-iccid, #select-port').prop('disabled', false); }
    function resetUI()  { unlockUI(); setStatus('Idle', 'Select a port and tap an action.'); }

    // ── Port management ────────────────────────────────────────────────────────

    function loadPorts() {
        if (!KioskBridge.isAvailable()) return;
        var ports = KioskBridge.listPorts();
        var stored = localStorage.getItem('selected_serial_port');
        $('#select-port').html('<option value="auto">Auto-Detect Dispenser</option>');
        ports.forEach(function (p) { $('#select-port').append($('<option>').val(p.id).text(p.name)); });
        if (stored && $('#select-port option[value="' + stored + '"]').length) {
            $('#select-port').val(stored);
        }
        log('Found ' + ports.length + ' port(s).');
    }

    /** Lazily open + cache a controller for the selected port */
    function getController() {
        if (controller) return Promise.resolve(controller);

        var portId = $('#select-port').val();
        if (portId === 'auto') {
            var ports = KioskBridge.listPorts();
            return MtkF31Controller.autoDetectPort(ports, KioskBridge.openPort, log)
                .then(function (id) {
                    $('#select-port').val(id);
                    localStorage.setItem('selected_serial_port', id);
                    return buildController(id);
                });
        }
        return Promise.resolve(buildController(portId));
    }

    function buildController(portId) {
        var conn = KioskBridge.openPort(portId, { onLog: log });
        controller = MtkF31Controller(conn, { onLog: log, onStatus: setStatus });
        return controller;
    }

    // ── Boot ───────────────────────────────────────────────────────────────────

    $(document).ready(function () {
        // Bridge status badge
        var avail = KioskBridge.isAvailable();
        $('#badge-dot').css({ background: avail ? '#10b981' : '#94a3b8',
                              boxShadow:  avail ? '0 0 6px rgba(16,185,129,.6)' : 'none' });
        $('#badge-label').text(avail ? 'JSAPI' : 'Preview');

        if (avail) {
            KioskBridge.signalReady();
            log('KIOSK.inited() sent.');
            loadPorts();
        } else {
            log('Bridge not detected — running in preview mode.', 'warn');
        }

        // Refresh ports on dropdown interaction
        $('#select-port').on('mousedown focus', loadPorts);

        // Port change → invalidate cached controller
        $('#select-port').change(function () {
            controller = null;
            localStorage.setItem('selected_serial_port', $(this).val());
        });

        // Clear logs
        $('#console-clear').click(function () { $('#console-log').empty(); log('Logs cleared.'); });

        // ── Button wiring ── (each handler is now a one-liner)

        $('#btn-dispense').click(function () {
            if (!KioskBridge.isAvailable()) { alert('KIOSK API not available.'); return; }
            lockUI();
            getController()
                .then(function (c) { return c.dispense(); })
                .then(function ()   { log('Dispense complete.'); setTimeout(resetUI, 2000); })
                .catch(function (e) { log('Dispense failed: ' + e.message, 'error'); setStatus('Failed', e.message); setTimeout(resetUI, 3000); });
        });

        $('#btn-read-iccid').click(function () {
            if (!KioskBridge.isAvailable()) { alert('KIOSK API not available.'); return; }
            lockUI();
            getController()
                .then(function (c) { return c.readIccid(); })
                .then(function (id) { log('ICCID: ' + id); setTimeout(resetUI, 3000); })
                .catch(function (e) { log('Read failed: ' + e.message, 'error'); setStatus('Read Failed', e.message); setTimeout(resetUI, 3000); });
        });
    });
    </script>

</body>
</html>
